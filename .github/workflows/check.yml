name: teber-track

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: teber-track
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run tracker
        env:
          TG_TOKEN: ${{ secrets.TG_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python main.py

      - name: Commit state & data
        run: |
          git config user.name "teber-track-bot"
          git config user.email "bot@users.noreply.github.com"
          git add -A state.json data.json history.csv || true
          git commit -m "update [skip ci]" || echo "no changes"
          git push || echo "nothing to push"
